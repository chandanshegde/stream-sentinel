version: "3.8"

services:
  minio:
    image: minio/minio:RELEASE.2023-10-24T04-42-36Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/flink-checkpoints;
      mc mb local/iceberg-warehouse;
      mc mb local/spark-checkpoints;
      exit 0;
      "

  pulsar:
    image: apachepulsar/pulsar:3.1.0
    command: bin/pulsar standalone
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/v2/clusters"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: stream_sentinel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  ner-service:
    build:
      context: ./ner-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    depends_on:
      - pulsar

  ingest-api:
    build:
      context: .
      dockerfile: ingest-api/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PULSAR_SERVICE_URL=pulsar://pulsar:6650
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      pulsar:
        condition: service_healthy
